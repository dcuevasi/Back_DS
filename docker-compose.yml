services:
  db:
    image: postgres:16
    container_name: notes_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notesdb
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
